<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body{
    font-family: sans-serif;
    background-color: whitesmoke;
}

.paytm-credit-container{
    display:flex;
    flex-direction:row;
    gap:20px;
    margin:5%;
  
}
.credit-cards{
    /* border:2px solid black; */
    padding:5% 4% 3% 2%
    /* width:50% */;
    border-radius:15px
}
        .credit-cards .image1{
            width:30%
        }
        .credit-cards button{
            padding:10px 25px;
            border-radius:999px;
            border:2px solid #002970;
            color:#002970
        }
         .credit-cards button:hover{
           background-color:  #002970;
           color:white
         }
         .credit-cards .image2{
            width:40%
         }
         .credit-cards .apply{
            display:flex;
            gap:10px;
            margin-bottom: 30px;
         }
         .credit-cards .image3{
            width:85%

         }
         .credit-bg{
          
    background-image: url(https://assetscdn1.paytm.com/images/catalog/view_item/1725638720587.png);
/* background-position: center;
background-repeat: no-repeat; */
background-size: cover;
         }
         .family-bg{
          background: linear-gradient(#D3F5FF, #FFFFFF);
         }

 @media(max-width:576px){
.paytm-credit-container{
  flex-direction: column;
}
.credit-cards h1{
  font-size: 2rem;
}
 .credit-cards .apply{
  flex-direction: column;
  align-items: center;
 }
 .credit-cards .image2{
            width:70%
         }
 }

         @media(max-width:992px){
.paytm-credit-container{
  flex-direction: column;
}
.credit-cards h1{
  font-size: 3rem;
}
         }
    </style>
  </head>
  <body>
    <div class="paytm-credit-container">
      <div class="credit-cards credit-bg">
        <img
          src="https://assetscdn1.paytm.com/images/catalog/view_item/2988623/27220898816562102.png"
          alt=""
          class="image1"
        />
        <h1>One destination for<br> <span style="color:#00BAF2">Credit Cards</span></h1>
        <p>
          Paytm HDFC, SBI Card & Axis Bank Credit Card with <br> assured Cashback and
          incredible offers.
        </p>

        <div class="apply">
        <button>Apply Now  <i class="fa-solid fa-right-long"></i></button>
        <img
        class="image2"
          src="https://assetscdn1.paytm.com/images/catalog/view_item/1741675100265.png"
          alt=""
        />
        </div>
        <img 
        class="image3"
          src="https://assetscdn1.paytm.com/images/catalog/view_item/2988623/27221716933469500.png"
          alt=""
        />
      </div>
      <div class="credit-cards family-bg">
        <img
          src="https://assetscdn1.paytm.com/images/catalog/view_item/2834804/1725623952233.png"
          alt=""
          class="image1"
        />
        <h1>Insurance ka<br> <span style="color:#00BAF2">Super Market</span></h1>
        <p>
          A Smart, Simple & Transparent Platform to Explore & <br>Purchase Insurance.
        </p>

        <div class="apply">
        <button>Get It Now   <i class="fa-solid fa-right-long"></i></button>
       
        </div>
        <img 
        class="image3"
          src="https://assetscdn1.paytm.com/images/catalog/view_item/2988624/27217428616091880.png"
          alt=""
        />
      </div>
    </div>
  </body>
</html>
